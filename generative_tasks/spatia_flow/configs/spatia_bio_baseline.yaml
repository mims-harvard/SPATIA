# ==============================================================================
# SPATIA-CellFlux Configuration: Biological Perturbation Tasks
# ==============================================================================
# This config supports tumor progression and immune infiltration tasks
# using SPATIA embeddings as conditioning for flow matching.

# Task name identifier
task_name: spatia_perturbation

# Dataset configuration
# Use 'xenium' for full model, 'xenium_small' for memory-constrained testing
dataset: xenium_small  # Changed to small model for memory efficiency
dataset_name: xenium

# Image settings
n_channels: 3
image_size: 256

# ==============================================================================
# DATA PATHS - Using real generated pairing data
# ==============================================================================

# AnnData file with cell expression and annotations
# Set to your local path, e.g.: /path/to/data/Xenium_FFPE_Human_Breast_Cancer_Rep1_outs/adata_processed_0212_with_cell_state.h5ad
adata_path: /path/to/data/adata_processed_0212_with_cell_state.h5ad

# CSV file with paired control->target cell indices (3292 pairs)
# Generated by data_pairing_for_FM/generate_spatia_pairs.py
# Now includes ot_confidence column for weighted training
pairs_csv: /path/to/data_pairing_for_FM/spatia_pairs_output/perturbation_pairs.csv

# LMDB database containing cell images
lmdb_path: /path/to/data/lmdb/xenium_he_0919.lmdb

# NPZ file with differential expression signatures (delta_g)
delta_g_npz: /path/to/data_pairing_for_FM/spatia_pairs_output/delta_g_signatures.npz

# NPZ file with morphology shift signatures (delta_m)
# Generated by generate_spatia_pairs.py with --lmdb_path option
delta_m_npz: /path/to/data_pairing_for_FM/spatia_pairs_output/delta_m_signatures.npz

# ==============================================================================
# SPATIA MODEL PATHS - Xenium-trained multimodal model
# ==============================================================================

# SPATIA model checkpoint directory
spatia_model_path: /path/to/spatia-scgpt/checkpoint/

# Gene vocabulary JSON file
spatia_vocab_path: /path/to/spatia-scgpt/checkpoint/vocab.json

# Gene statistics CSV for normalization
spatia_gene_stats: /path/to/spatia-scgpt/checkpoints/all_dict_mean_std.csv

# ==============================================================================
# CONDITIONING SETTINGS
# ==============================================================================

# DISABLED for CellFlux baseline — no SPATIA conditioning
use_condition_embeddings: False

# SPATIA embedding dimension (must match model)
condition_embedding_dimension: 512

# Whether embeddings are trainable
trainable_emb: False

# Modality list
modality_list:
  - Spatial

# ==============================================================================
# TRAINING SETTINGS
# ==============================================================================

# Data augmentation during training
augment_train: True

# Normalize images to [-1, 1] (CellFlux format)
normalize: True

# Add control images to training set
add_controls: False

# Batch correction (not used for SPATIA)
batch_correction: False
batch_key: null

# Multimodal settings
multimodal: False

# Out-of-distribution test set (empty = none)
ood_set: []

# Molecule list (null = use all)
mol_list: null

# ==============================================================================
# TRAINING HYPERPARAMETERS
# ==============================================================================

# Learning rate
lr: 0.0001

# Optimizer betas
optimizer_betas: [0.9, 0.95]

# Probability to drop conditioning during training (for CFG)
class_drop_prob: 0.1

# Use control image as initial state (1=use, 2=use with noise, 0=random noise)
use_initial: 1

# Noise settings when use_initial=2
noise_level: 0.2
noise_prob: 0.5

# Use skewed timestep sampling (EDM paper)
skewed_timesteps: False

# Use EDM time discretization during sampling
edm_schedule: False

# ODE solver settings
ode_method: midpoint
ode_options:
  step_size: 0.01

# CFG scale for generation
cfg_scale: 0.2

# ==============================================================================
# SPATIA-FLOW LOSS SETTINGS
# ==============================================================================

# Use OT-confidence weighted flow matching loss
use_weighted_fm: True

# Exponent for OT confidence weighting (higher = more weight on confident pairs)
# w_i = confidence_i^alpha, then normalized by mean
ot_alpha: 1.0

# Weight for contrastive conditioning loss (0 = disabled)
# Encourages model to be sensitive to correct conditioning
# Disabled for baseline (no conditioning to contrast against)
lambda_contrast: 0.0

# Weight for SWD morphology alignment loss (0 = disabled)
# Aligns predicted cell morphology distribution with target
lambda_morph: 0.01

# Use SpatiaConditioner for multi-modal conditioning
# Combines: z_ctrl (SPATIA), transition_id, delta_g, delta_m
use_spatia_conditioner: False

# SpatiaConditioner dimensions (should match your data)
spatia_conditioner_config:
  num_transitions: 10
  dim_g: 512
  dim_m: 10
  embed_dim: 512
  ctrl_embed_dim: 512
  dropout: 0.1

# ==============================================================================
# DEBUGGING / TESTING
# ==============================================================================

# Limit number of pairs for debugging (null = use all 3292 pairs)
max_pairs: null

# Iterate over control samples instead of target
iter_ctrl: False
